<!DOCTYPE html>
<html>
<head>
<title>Detection Result</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="background:#f8f9fa;">

<div class="container py-4">

<h2 class="text-center text-primary mb-4">
Detection Result Dashboard
</h2>

<div class="card shadow p-4">

<h5 class="text-primary">Live Waveform</h5>
<canvas id="waveChart"></canvas>

<hr>

<div class="row">
<div class="col-md-6 text-center">
<h6>Spectrogram</h6>
<img src="{{ url_for('static', filename=spectrogram) }}" class="img-fluid border rounded">
</div>

<div class="col-md-6 text-center">
<h6>Scalogram</h6>
<img src="{{ url_for('static', filename=scalogram) }}" class="img-fluid border rounded">
</div>
</div>

<hr>

<h4 class="text-primary text-center">Spectrogram Prediction</h4>
<p class="text-center">
Prediction: <b>{{ prediction_spec }}</b><br>
Confidence: {{ confidence_spec }}%
</p>
<p class="text-center text-danger">
{{ description_spec }}
</p>
<canvas id="probChartSpec"></canvas>

<hr>

<h4 class="text-primary text-center">Scalogram Prediction</h4>
<p class="text-center">
Prediction: <b>{{ prediction_scal }}</b><br>
Confidence: {{ confidence_scal }}%
</p>
<p class="text-center text-danger">
{{ description_scal }}
</p>
<canvas id="probChartScal"></canvas>

</div>
</div>

<script>
let waveform = {{ waveform | tojson }};

new Chart(document.getElementById("waveChart"), {
type:'line',
data:{labels:waveform.map((_,i)=>i),
datasets:[{label:'Signal',data:waveform}]},
options:{animation:false}
});

new Chart(document.getElementById("probChartSpec"), {
type:'bar',
data:{
labels:['Islanding','Non-Islanding'],
datasets:[{
label:'Spectrogram Probability',
data:[{{ prob_islanding_spec }}, {{ prob_non_islanding_spec }}]
}]
},
options:{scales:{y:{beginAtZero:true,max:1}}}
});

new Chart(document.getElementById("probChartScal"), {
type:'bar',
data:{
labels:['Islanding','Non-Islanding'],
datasets:[{
label:'Scalogram Probability',
data:[{{ prob_islanding_scal }}, {{ prob_non_islanding_scal }}]
}]
},
options:{scales:{y:{beginAtZero:true,max:1}}}
});
</script>

</body>
</html>
