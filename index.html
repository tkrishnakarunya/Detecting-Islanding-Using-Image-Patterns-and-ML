<!DOCTYPE html>
<html>
<head>
    <title>Islanding Detection System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f8f9fa;">

<div class="container py-5">

<h2 class="text-center text-primary mb-4">
Intelligent Islanding Detection System
</h2>

<div class="card shadow p-4">

<form action="/predict" method="POST">

<h5 class="text-primary">Manual Input</h5>

<input type="number" name="dvdt" step="0.01"
class="form-control mb-2"
placeholder="dvneg/dt (e.g 0.15)" required>

<input type="number" name="vthd" step="0.01"
class="form-control mb-2"
placeholder="Voltage THD (e.g 0.25)" required>

<input type="number" name="cthd" step="0.01"
class="form-control mb-3"
placeholder="Current THD (e.g 0.30)" required>

<button type="submit" class="btn btn-primary w-100 mb-3">
Predict from Input
</button>

</form>

<hr>


</div>

</div>



</body>
</html>
